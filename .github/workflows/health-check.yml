name: Health Check

on:
  schedule:
    # Runs at 08:00 UTC daily
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run health checks
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/health_check.py > data/health.json
          echo "done"

      - name: Commit health data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/health.json
          git diff --staged --quiet || git commit -m "chore: update health check $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
